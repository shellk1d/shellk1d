<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shellk1d - Blog</title>
  <meta name="description"
    content="Opiniones, tutoriales y análisis técnico sobre ciberseguridad ofensiva, Red Team y el sector.">
  <meta name="theme-color" content="#0a0a0a">
  
  <!-- OpenGraph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://shellk1d.github.io/blog.html">
  <meta property="og:title" content="Blog — shellk1d">
  <meta property="og:description" content="Opiniones, tutoriales y análisis técnico sobre ciberseguridad ofensiva, Red Team y el sector.">
  <meta property="og:image" content="images/og-image.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://shellk1d.github.io/blog.html">
  <meta property="twitter:title" content="Blog — shellk1d">
  <meta property="twitter:description" content="Opiniones, tutoriales y análisis técnico sobre ciberseguridad ofensiva, Red Team y el sector.">
  <meta property="twitter:image" content="images/og-image.png">

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'></text></svg>">
</head>

<body>
  <div id="pageWrapper" class="page-wrapper">

    <div class="page-header">
      <div class="page-header-inner">
        <div class="page-header-eyebrow">cat blog/*.md</div>
        <h1 class="page-header-title">Blog</h1>
        <p class="page-header-sub">Opiniones sobre el sector, análisis técnicos, tutoriales y reflexiones sobre la
          seguridad ofensiva.</p>
      </div>
    </div>

    <div class="section" style="max-width:1200px; margin:0 auto;">

      <div style="display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-start; margin-bottom:2rem;">
        <div class="search-wrap" style="flex:1; max-width:360px; margin-bottom:0;">
          <span class="search-icon">⌕</span>
          <input type="text" id="blogSearch" placeholder="Buscar artículos...">
        </div>
        <div class="filters" id="categoryFilter">
          <button class="filter-btn active" data-filter="all">Todos</button>
          <button class="filter-btn" data-filter="técnico">Técnico</button>
          <button class="filter-btn" data-filter="opinión">Opinión</button>
          <button class="filter-btn" data-filter="tutorial">Tutorial</button>
          <button class="filter-btn" data-filter="certificaciones">Certificaciones</button>
        </div>
      </div>

      <div class="grid-2" id="blogList"></div>
      <div id="noResults" class="no-results" style="display:none;">
        <div style="font-size:1.5rem;margin-bottom:0.5rem;">[ 0x0 ]</div>
        No se encontraron resultados.
      </div>

    </div>

  </div>

  <script src="js/content.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      setActivePage('blog');
      await renderBlog('blogList');
      initFilters('blogList', 'categoryFilter', 'blogSearch', '.card', 'category');
    });
  </script>
</body>

</html>
